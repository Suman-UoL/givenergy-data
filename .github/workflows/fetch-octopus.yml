name: Fetch Octopus Data

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run fetcher
        env:
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
        run: python scripts/octopus_fetch.py
      - name: Commit data
        run: |
          git config user.name "givenergy-bot"
          git config user.email "bot@givenergy-data"
          git add data/octopus/
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: octopus data update $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
